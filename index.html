    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBbeaPoAYILiVX3yGqhtdvEktZ5DIxlpY",
            authDomain: "clinic-fa8a2.firebaseapp.com",
            projectId: "clinic-fa8a2",
            storageBucket: "clinic-fa8a2.firebasestorage.app",
            messagingSenderId: "316441755643",
            appId: "1:316441755643:web:ba058608b7f7196596155e"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // دوال التنقل
        window.showAppContent = async () => {
            try {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                await loadPosts(false); // للمرضى والزوار بدون حذف
            } catch (err) {
                console.error('Error:', err);
            }
        };
        window.showAdminPanel = async () => {
            try {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('app-content').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                
                await loadAppointments();
                await loadPendingUsers();
                await loadApprovedUsers();
                await loadAdminPosts(); // تحميل التدوينات للإدارة مع الحذف
            } catch (err) {
                console.error('Error loading admin panel:', err);
                alert('خطأ في تحميل البيانات: ' + err.message);
            }
        };

        window.showLogin = async () => {
            try {
                await signOut(auth);
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
                document.getElementById('userEmail').value = '';
                document.getElementById('userPass').value = '';
                document.getElementById('adminPass').value = '';
                document.getElementById('user-status').textContent = '';
                document.getElementById('logout-btn').classList.add('hidden');
            } catch (err) {
                console.error('Logout error:', err);
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('user-status').textContent = `مرحباً، ${user.email}`;
                document.getElementById('logout-btn').classList.remove('hidden');
                await loadPosts(false);
            }
        });

        async function checkIfUserApproved(email) {
            try {
                const q = query(collection(db, "users"), where("email", "==", email));
                const querySnapshot = await getDocs(q);
                let isApproved = false;
                querySnapshot.forEach((d) => {
                    if (d.data().isApproved) isApproved = true;
                });
                return isApproved;            } catch (err) {
                console.error('Check approval error:', err);
                return false;
            }
        }

        window.handleLogin = async () => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            
            if (!email || !pass) {
                alert('يرجى ملء جميع الحقول');
                return;
            }
            
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                const isApproved = await checkIfUserApproved(email);

                if (!isApproved) {
                    await signOut(auth);
                    alert('عذراً، حسابك لا يزال قيد مراجعة الإدارة.');
                    return;
                }
                
                await window.showAppContent();
            } catch (error) {
                alert('خطأ في الدخول: ' + error.message);
            }
        };

        window.handleRegister = async () => {
            const email = document.getElementById('newUserEmail').value;
            const pass = document.getElementById('newUserPass').value;
            
            if (!email || !pass) {
                alert('يرجى ملء جميع الحقول');
                return;
            }
            
            if (pass.length < 6) {
                alert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            try {
                const providers = await fetchSignInMethodsForEmail(auth, email);
                
                if (providers.length > 0) {
                    const isApproved = await checkIfUserApproved(email);                    if (isApproved) {
                        alert('هذا البريد مسجل مسبقاً. يرجى تسجيل الدخول.');
                    } else {
                        alert('طلبك قيد المراجعة.');
                    }
                    switchTab('login');
                    return;
                }
                
                await createUserWithEmailAndPassword(auth, email, pass);
                await addDoc(collection(db, "users"), {
                    email: email,
                    isApproved: false,
                    role: 'patient',
                    createdAt: new Date().toLocaleDateString('ar-SA')
                });
                
                await signOut(auth);
                alert('✅ تم إرسال طلب التسجيل بنجاح!');
                switchTab('login');
                
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        };

        window.handleLogout = async () => {
            await signOut(auth);
            window.showLogin();
        };

        const _adminKey = "c2FsZW0xOTU5"; 
        
        window.adminAccess = async () => {
            const input = document.getElementById('adminPass').value;
            if (input === atob(_adminKey)) {
                await window.showAdminPanel();
            } else { 
                alert('كلمة مرور الإدارة غير صحيحة'); 
            }
        };

        window.browseAsGuest = async () => {
            await window.showAppContent();
        };

        // ========== المواعيد ==========
        window.bookAppointment = async () => {
            const name = document.getElementById('appointmentName').value.trim();
            const phone = document.getElementById('appointmentPhone').value.trim();            const date = document.getElementById('appointmentDate').value;
            const notes = document.getElementById('appointmentNotes').value.trim();
            
            if (!name || !phone || !date) {
                alert('يرجى ملء الحقول المطلوبة');
                return;
            }
            
            try {
                await addDoc(collection(db, "appointments"), {
                    name: name,
                    phone: phone,
                    date: date,
                    notes: notes || 'لا يوجد',
                    status: 'pending',
                    createdAt: new Date().toISOString()
                });
                
                document.getElementById('appointmentName').value = '';
                document.getElementById('appointmentPhone').value = '';
                document.getElementById('appointmentDate').value = '';
                document.getElementById('appointmentNotes').value = '';
                
                alert('✅ تم إرسال طلب الحجز بنجاح!');
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        };

        window.loadAppointments = async () => {
            try {
                const wrapper = document.getElementById('appointments-wrapper');
                wrapper.innerHTML = "<p>جاري التحميل...</p>";
                
                const q = query(collection(db, "appointments"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                wrapper.innerHTML = "";
                
                let pendingCount = 0;
                let totalCount = 0;
                
                if (querySnapshot.empty) {
                    wrapper.innerHTML = "<p style='text-align:center; color:#666; padding:20px;'>لا توجد مواعيد</p>";
                    document.getElementById('appointments-count').textContent = '(0)';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();                    totalCount++;
                    if (data.status === 'pending') pendingCount++;
                    
                    const statusColors = {
                        'pending': 'background:#fef3c7; color:#92400e;',
                        'confirmed': 'background:#d1fae5; color:#065f46;',
                        'completed': 'background:#dbeafe; color:#1e40af;',
                        'cancelled': 'background:#fee2e2; color:#991b1b;'
                    };
                    
                    const statusText = {
                        'pending': '⏳ انتظار',
                        'confirmed': '✅ مؤكد',
                        'completed': '✔️ مكتمل',
                        'cancelled': '❌ ملغي'
                    };
                    
                    wrapper.innerHTML += `
                        <div class="appointment-card">
                            <div class="appointment-header">
                                <div>
                                    <strong>${data.name}</strong>
                                    <span style="background:${statusColors[data.status]}; padding:3px 10px; border-radius:12px; font-size:11px; margin-right:8px;">${statusText[data.status]}</span>
                                </div>
                                <span class="post-date">${data.date}</span>
                            </div>
                            <div style="font-size:14px; margin-bottom:10px;">📱 ${data.phone}</div>
                            <div class="user-actions">
                                <button onclick="updateStatus('${docSnap.id}', 'confirmed')" class="btn-action btn-share">تأكيد</button>
                                <button onclick="updateStatus('${docSnap.id}', 'completed')" class="btn-action" style="background:#dbeafe; color:#2563eb;">مكتمل</button>
                                <button onclick="updateStatus('${docSnap.id}', 'cancelled')" class="btn-action" style="background:#fef3c7; color:#92400e;">إلغاء</button>
                                <button onclick="deleteDoc(doc(db, 'appointments', '${docSnap.id}')).then(loadAppointments)" class="btn-action btn-delete">حذف</button>
                            </div>
                        </div>`;
                });
                
                document.getElementById('appointments-count').textContent = `(${totalCount})`;
                document.getElementById('pending-count').textContent = pendingCount > 0 ? `(${pendingCount} جديد)` : '';
            } catch (err) {
                console.error('Load appointments error:', err);
                document.getElementById('appointments-wrapper').innerHTML = 
                    `<p style='color:red'>خطأ: ${err.message}</p>`;
            }
        };

        window.updateStatus = async (docId, status) => {
            try {
                await updateDoc(doc(db, "appointments", docId), { status });
                await loadAppointments();
                alert('تم التحديث');            } catch (err) {
                alert('خطأ: ' + err.message);
            }
        };

        // ========== المستخدمين ==========
        window.loadPendingUsers = async () => {
            try {
                const q = query(collection(db, "users"), where("isApproved", "==", false));
                const querySnapshot = await getDocs(q);
                const wrapper = document.getElementById('pending-users-wrapper');
                wrapper.innerHTML = "";
                
                if (querySnapshot.empty) {
                    wrapper.innerHTML = "<p style='text-align:center; color:#666; padding:20px;'>لا توجد طلبات معلقة</p>";
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    wrapper.innerHTML += `
                        <div class="user-card">
                            <div class="user-info"><strong>${data.email}</strong></div>
                            <div class="user-actions">
                                <button onclick="approveUser('${docSnap.id}')" class="btn-action btn-share">قبول</button>
                                <button onclick="deleteDoc(doc(db, 'users', '${docSnap.id}')).then(loadPendingUsers)" class="btn-action btn-delete">حذف</button>
                            </div>
                        </div>`;
                });
            } catch (err) {
                console.error('Load pending users error:', err);
            }
        };

        window.loadApprovedUsers = async () => {
            try {
                const q = query(collection(db, "users"), where("isApproved", "==", true));
                const querySnapshot = await getDocs(q);
                const wrapper = document.getElementById('approved-users-wrapper');
                wrapper.innerHTML = "";
                
                if (querySnapshot.empty) {
                    wrapper.innerHTML = "<p style='text-align:center; color:#666; padding:20px;'>لا يوجد مشتركين</p>";
                    document.getElementById('users-count').textContent = '(0)';
                    return;
                }

                let count = 0;
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();                    count++;
                    wrapper.innerHTML += `
                        <div class="user-card">
                            <div class="user-info"><strong>${data.email}</strong></div>
                            <div class="user-actions">
                                <button onclick="deleteDoc(doc(db, 'users', '${docSnap.id}')).then(loadApprovedUsers)" class="btn-action btn-delete">حذف</button>
                            </div>
                        </div>`;
                });
                
                document.getElementById('users-count').textContent = `(${count})`;
            } catch (err) {
                console.error('Load approved users error:', err);
            }
        };

        window.approveUser = async (docId) => {
            try {
                await updateDoc(doc(db, "users", docId), { isApproved: true });
                await loadPendingUsers();
                await loadApprovedUsers();
                alert('✅ تم القبول');
            } catch (err) {
                alert('خطأ: ' + err.message);
            }
        };

        // ========== التدوينات ==========
        
        // دالة نشر تدوينة جديدة (تُستدعى من الإدارة)
        window.addPost = async () => {
            const title = document.getElementById('postTitle').value;
            const text = document.getElementById('postText').value;
            const file = document.getElementById('imageInput').files[0];
            
            if (!file || !title) {
                alert('يرجى اختيار صورة وعنوان');
                return;
            }

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    await addDoc(collection(db, "posts"), { 
                        title, 
                        text, 
                        img: e.target.result,
                        date: new Date().toLocaleDateString('ar-SA')
                    });
                    document.getElementById('postTitle').value = '';                    document.getElementById('postText').value = '';
                    document.getElementById('imageInput').value = '';
                    alert('✅ تم النشر');
                    await loadAdminPosts(); // تحديث قائمة الإدارة
                } catch (err) {
                    alert('خطأ: ' + err.message);
                }
            };
            reader.readAsDataURL(file);
        };

        // دالة تحميل التدوينات للمرضى والزوار (بدون حذف)
        window.loadPosts = async () => {
            try {
                const querySnapshot = await getDocs(collection(db, "posts"));
                const wrapper = document.getElementById('posts-wrapper');
                wrapper.innerHTML = "";
                
                if (querySnapshot.empty) {
                    wrapper.innerHTML = "<p style='text-align:center; color:#666; padding:40px;'>لا توجد تدوينات</p>";
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    wrapper.innerHTML += `
                        <div class="post-card">
                            <div class="post-header">
                                <h3>${data.title}</h3>
                                <span class="post-date">${data.date}</span>
                            </div>
                            <img src="${data.img}" style="width:100%; border-radius:8px; margin-bottom:12px;">
                            <p>${data.text}</p>
                        </div>`;
                });
            } catch (err) {
                console.error('Load posts error:', err);
            }
        };

        // دالة تحميل التدوينات للإدارة (مع حذف) - هذه هي الدالة الجديدة
        window.loadAdminPosts = async () => {
            try {
                const querySnapshot = await getDocs(collection(db, "posts"));
                const wrapper = document.getElementById('admin-posts-wrapper');
                wrapper.innerHTML = "";
                
                console.log('عدد التدوينات في الإدارة:', querySnapshot.size);
                
                if (querySnapshot.empty) {                    wrapper.innerHTML = "<p style='text-align:center; color:#666; padding:20px;'>لا توجد تدوينات منشورة</p>";
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    wrapper.innerHTML += `
                        <div class="post-card">
                            <div class="post-header">
                                <h3>${data.title}</h3>
                                <span class="post-date">${data.date}</span>
                            </div>
                            <img src="${data.img}" style="width:100%; border-radius:8px; margin-bottom:12px; max-height:200px; object-fit:cover;">
                            <p style="font-size:14px; color:#555;">${data.text}</p>
                            <div class="post-actions">
                                <button onclick="deleteAdminPost('${docSnap.id}', '${data.title.replace(/'/g, "\\'")}')" class="btn-action btn-delete">
                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
                                    حذف التدوينة
                                </button>
                            </div>
                        </div>`;
                });
            } catch (err) {
                console.error('Load admin posts error:', err);
                document.getElementById('admin-posts-wrapper').innerHTML = 
                    `<p style='color:red'>خطأ في تحميل التدوينات: ${err.message}</p>`;
            }
        };

        // دالة حذف التدوينة من الإدارة
        window.deleteAdminPost = async (postId, title) => {
            if (confirm(`هل أنت متأكد من حذف التدوينة:\n"${title}"\n\nسيتم الحذف نهائياً!`)) {
                try {
                    await deleteDoc(doc(db, "posts", postId));
                    alert('✅ تم حذف التدوينة');
                    await loadAdminPosts();
                } catch (err) {
                    alert('خطأ في الحذف: ' + err.message);
                }
            }
        };

        window.updateWhatsApp = () => {
            const num = document.getElementById('whatsappNumber').value;
            if (!num) {
                alert('يرجى إدخال الرقم');
                return;
            }
            document.getElementById('whatsappLink').href = "https://wa.me/" + num;
            alert("✅ تم الحفظ");        };

        // ========== تثبيت التطبيق ==========
        window.installApp = () => {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isAndroid = /Android/.test(navigator.userAgent);
            
            let message = '';
            
            if (isIOS) {
                message = '📱 لتثبيت التطبيق على iPhone:\n\n' +
                          '1️ اضغط على زر "مشاركة" (المربع مع السهم) في أسفل المتصفح\n\n' +
                          '2️⃣ اختر "إضافة إلى الشاشة الرئيسية"\n\n' +
                          '3️⃣ اضغط "إضافة" في الأعلى';
            } else if (isAndroid) {
                message = '📱 لتثبيت التطبيق على Android:\n\n' +
                          '1️⃣ اضغط على القائمة () في أعلى المتصفح\n\n' +
                          '2️⃣ اختر "تثبيت التطبيق" أو "إضافة إلى الشاشة الرئيسية"\n\n' +
                          '3️⃣ اضغط "تثبيت"';
            } else {
                message = '📱 لتثبيت التطبيق على الكمبيوتر:\n\n' +
                          '1️ اضغط على أيقونة التثبيت في شريط العنوان (على اليمين)\n\n' +
                          'أو\n\n' +

<section id="login-section" class="login-fullscreen">

    <button onclick="installApp()" class="btn-install">
        <svg width="22" height="22" fill="currentColor" viewBox="0 0 16 16">

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if (tab === 'login') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }
    }
</script>
