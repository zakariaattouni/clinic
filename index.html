        async function checkIfUserApproved(email) {
            try {
                const q = query(collection(db, "users"), where("email", "==", email));
                const querySnapshot = await getDocs(q);
                let isApproved = false;
                querySnapshot.forEach((d) => {
                    if (d.data().isApproved) isApproved = true;
                });
                return isApproved;            } catch (err) {
                console.error('Check approval error:', err);
                return false;
            }
        }

                window.showNotification('يرجى ملء جميع الحقول', 'error');
                return;
            }
            
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                const isApproved = await checkIfUserApproved(email);

                if (!isApproved) {
                    await signOut(auth);
                    window.showNotification('عذراً، حسابك لا يزال قيد مراجعة الإدارة.', 'error');
                    return;

        window.loadAppointments = async () => {

                                <div>
                                    <strong>${data.name}</strong>

        function compressImage(file, maxWidth = 800, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;                        let height = img.height;
                        
                        if (width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        window.toggleLike = async (postId) => {
            try {
                const likedPosts = JSON.parse(localStorage.getItem('likedPosts') || '[]');
                const postRef = doc(db, "posts", postId);
                const btn = document.getElementById(`like-btn-${postId}`);
                const countEl = document.getElementById(`like-count-${postId}`);
                
                if (likedPosts.includes(postId)) {
                    // إلغاء الإعجاب
                    await updateDoc(postRef, { likes: increment(-1) });
                    const newCount = parseInt(countEl.textContent) - 1;
                    countEl.textContent = newCount;
                    btn.classList.remove('liked');
                    btn.innerHTML = `<svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314z"/></svg> <span>أعجبني</span>`;
                    
                    const newLiked = likedPosts.filter(id => id !== postId);
                    localStorage.setItem('likedPosts', JSON.stringify(newLiked));
                } else {
                    // إضافة إعجاب
                    await updateDoc(postRef, { likes: increment(1) });
                    const newCount = parseInt(countEl.textContent) + 1;
                    countEl.textContent = newCount;
                    btn.classList.add('liked');
                    btn.innerHTML = `<svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314z"/></svg> <span>أعجبني</span>`;
                    
                    likedPosts.push(postId);
                    localStorage.setItem('likedPosts', JSON.stringify(likedPosts));
                    
                    // تأثير نبض
                    btn.style.animation = 'pulse 0.4s';
                    setTimeout(() => btn.style.animation = '', 400);
                }
            } catch (err) {
                console.error('Like error:', err);
                window.showNotification('خطأ في الإعجاب', 'error');
            }

        async function loadComments(postId) {
            try {
                const wrapper = document.getElementById(`comments-list-${postId}`);
                wrapper.innerHTML = '<p style="color:#999; font-size:13px;">جاري تحميل التعليقات...</p>';
                
                const q = query(collection(db, "comments"), where("postId", "==", postId), orderBy("createdAt", "asc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    wrapper.innerHTML = '<p style="color:#999; font-size:13px; text-align:center; padding:10px;">لا توجد تعليقات بعد. كن أول من يعلّق!</p>';
                    return;
                }
                
                // فصل التعليقات الأصلية عن الردود
                const topLevel = [];
                const replies = {};
                
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    if (!data.parentId) {
                        topLevel.push({ id: docSnap.id, ...data });
                    } else {
                        if (!replies[data.parentId]) replies[data.parentId] = [];
                        replies[data.parentId].push({ id: docSnap.id, ...data });
                    }
                });
                
                let html = '';
                topLevel.forEach(comment => {
                    html += renderComment(comment, replies[comment.id] || [], postId);
                });
                
                wrapper.innerHTML = html;
            } catch (err) {
                console.error('Load comments error:', err);
                document.getElementById(`comments-list-${postId}`).innerHTML = '<p style="color:red; font-size:13px;">خطأ في تحميل التعليقات</p>';
            }
        }

        function renderComment(comment, replies, postId) {
            const repliesHtml = replies.map(reply => `
                <div class="comment reply">
                    <div class="comment-header">
                        <strong style="color:var(--secondary);">${escapeHtml(reply.name)}</strong>                        <span class="comment-date">${reply.date}</span>
                    </div>
                    <div class="comment-text">${escapeHtml(reply.text)}</div>
                </div>
            `).join('');
            
            return `
                <div class="comment">
                    <div class="comment-header">
                        <strong>${escapeHtml(comment.name)}</strong>
                        <span class="comment-date">${comment.date}</span>
                    </div>
                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                    <button class="reply-btn" onclick="window.toggleReplyForm('${postId}', '${comment.id}')">↩️ رد</button>
                    <div id="reply-form-${comment.id}" class="reply-form hidden">
                        <input type="text" id="reply-name-${comment.id}" placeholder="اسمك" class="modern-input" style="padding:8px; font-size:13px; margin:4px 0;">
                        <textarea id="reply-text-${comment.id}" placeholder="اكتب ردك..." class="modern-input" rows="2" style="padding:8px; font-size:13px; margin:4px 0;"></textarea>
                        <button onclick="window.submitReply('${postId}', '${comment.id}')" class="btn-action btn-share" style="padding:6px 12px; font-size:12px;">إرسال الرد</button>
                    </div>
                    ${repliesHtml}
                </div>
            `;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.toggleReplyForm = (postId, commentId) => {
            const form = document.getElementById(`reply-form-${commentId}`);
            form.classList.toggle('hidden');
        };

        window.submitComment = async (postId) => {
            const nameInput = document.getElementById(`comment-name-${postId}`);
            const textInput = document.getElementById(`comment-text-${postId}`);
            const name = nameInput.value.trim();
            const text = textInput.value.trim();
            
            if (!name || !text) {
                window.showNotification('يرجى ملء الاسم والتعليق', 'error');
                return;
            }
            
            try {
                await addDoc(collection(db, "comments"), {
                    postId: postId,                    name: name,
                    text: text,
                    date: new Date().toLocaleDateString('ar-SA'),
                    createdAt: new Date().toISOString(),
                    parentId: null
                });
                
                nameInput.value = '';
                textInput.value = '';
                
                window.showNotification('✅ تم إضافة تعليقك', 'success');
                await loadComments(postId);
            } catch (err) {
                console.error('Add comment error:', err);
                window.showNotification('خطأ في إضافة التعليق', 'error');
            }
        };

        window.submitReply = async (postId, parentId) => {
            const nameInput = document.getElementById(`reply-name-${parentId}`);
            const textInput = document.getElementById(`reply-text-${parentId}`);
            const name = nameInput.value.trim();
            const text = textInput.value.trim();
            
            if (!name || !text) {
                window.showNotification('يرجى ملء الاسم والرد', 'error');
                return;
            }
            
            try {
                await addDoc(collection(db, "comments"), {
                    postId: postId,
                    name: name,
                    text: text,
                    date: new Date().toLocaleDateString('ar-SA'),
                    createdAt: new Date().toISOString(),
                    parentId: parentId
                });
                
                nameInput.value = '';
                textInput.value = '';
                document.getElementById(`reply-form-${parentId}`).classList.add('hidden');
                
                window.showNotification('✅ تم إرسال ردك', 'success');
                await loadComments(postId);
            } catch (err) {
                console.error('Add reply error:', err);
                window.showNotification('خطأ في إرسال الرد', 'error');
            }
        };
        window.loadPosts = async () => {
            try {
                const querySnapshot = await getDocs(collection(db, "posts"));
                const wrapper = document.getElementById('posts-wrapper');
                wrapper.innerHTML = "";
                
                if (querySnapshot.empty) {
                    wrapper.innerHTML = "<p style='text-align:center; color:#666; padding:40px;'>لا توجد تدوينات</p>";
                    return;
                }

                const likedPosts = JSON.parse(localStorage.getItem('likedPosts') || '[]');

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const likes = data.likes || 0;
                    const isLiked = likedPosts.includes(docSnap.id);
                    
                    wrapper.innerHTML += `
                        <div class="post-card">
                            <div class="post-header">
                                <h3>${escapeHtml(data.title)}</h3>
                                <span class="post-date">${data.date}</span>
                            </div>
                            <img src="${data.img}" style="width:100%; border-radius:8px; margin-bottom:12px;">
                            <p>${escapeHtml(data.text)}</p>
                            
                            <div class="post-interactions">
                                <button id="like-btn-${docSnap.id}" class="like-btn ${isLiked ? 'liked' : ''}" onclick="window.toggleLike('${docSnap.id}')">
                                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314z"/></svg>
                                    <span>أعجبني</span>
                                    <span id="like-count-${docSnap.id}" class="like-count">${likes}</span>
                                </button>
                                <button class="comment-btn" onclick="window.toggleCommentForm('${docSnap.id}')">
                                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M2.678 11.894a1 1 0 0 1 .287.801 10.97 10.97 0 0 1-.398 2c1.395-.323 2.247-.697 2.634-.893a1 1 0 0 1 .71-.074A8.06 8.06 0 0 0 8 14c3.996 0 7-2.807 7-6 0-3.192-3.004-6-7-6S1 4.808 1 8c0 1.468.617 2.83 1.678 3.894zm-.493 3.905a21.682 21.682 0 0 1-.713.129c-.2.032-.352-.176-.273-.362a9.68 9.68 0 0 0 .244-.637l.003-.01c.248-.72.45-1.548.524-2.319C.743 11.37 0 9.76 0 8c0-3.866 3.582-7 8-7s8 3.134 8 7-3.582 7-8 7a9.06 9.06 0 0 1-2.347-.306c-.52.263-1.639.742-3.468 1.105z"/></svg>
                                    <span>تعليق</span>
                                </button>
                            </div>
                            
                            <div id="comment-form-${docSnap.id}" class="comment-form hidden">
                                <div id="comments-list-${docSnap.id}" class="comments-list"></div>
                                <div class="comment-input-row">
                                    <input type="text" id="comment-name-${docSnap.id}" placeholder="اسمك" class="modern-input" style="padding:10px; font-size:13px; margin:4px 0;">
                                </div>
                                <div class="comment-input-row">
                                    <textarea id="comment-text-${docSnap.id}" placeholder="اكتب تعليقك..." class="modern-input" rows="2" style="padding:10px; font-size:13px; margin:4px 0;"></textarea>
                                </div>
                                <button onclick="window.submitComment('${docSnap.id}')" class="btn-action btn-share" style="margin-top:8px;">إرسال التعليق</button>
                            </div>                        </div>`;
                });
            } catch (err) {
                console.error('Load posts error:', err);
            }
        };

        window.loadAdminPosts = async () => {
            try {
                const querySnapshot = await getDocs(collection(db, "posts"));
                const wrapper = document.getElementById('admin-posts-wrapper');
                wrapper.innerHTML = "";
                
                if (querySnapshot.empty) {
                    wrapper.innerHTML = "<p style='text-align:center; color:#666; padding:20px;'>لا توجد تدوينات منشورة</p>";
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const likes = data.likes || 0;
                    wrapper.innerHTML += `
                        <div class="post-card">
                            <div class="post-header">
                                <h3>${escapeHtml(data.title)}</h3>
                                <span class="post-date">${data.date}</span>
                            </div>
                            <img src="${data.img}" style="width:100%; border-radius:8px; margin-bottom:12px; max-height:200px; object-fit:cover;">
                            <p style="font-size:14px; color:#555;">${escapeHtml(data.text)}</p>
                            <div style="font-size:13px; color:#666; margin-top:10px;">❤️ ${likes} إعجاب</div>
                            <div class="post-actions">
                                <button onclick="window.deleteDocAndRefresh('${docSnap.id}', 'posts')" class="btn-action btn-delete">
                                    حذف التدوينة
                                </button>
                            </div>
                        </div>`;
                });
            } catch (err) {
                console.error('Load admin posts error:', err);
                document.getElementById('admin-posts-wrapper').innerHTML = `<p style='color:red'>خطأ في تحميل التدوينات: ${err.message}</p>`;
            }
        };

        window.updateWhatsApp = () => {
            const num = document.getElementById('whatsappNumber').value;
            if (!num) {
                window.showNotification('يرجى إدخال الرقم', 'error');
                return;
            }
            document.getElementById('whatsappLink').href = "https://wa.me/" + num;            window.showNotification('✅ تم حفظ رقم الواتساب', 'success');
        };

        window.installApp = () => {
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isAndroid = /Android/.test(navigator.userAgent);
            let message = '';
            
            if (isIOS) {
                message = '📱 لتثبيت التطبيق على iPhone:\n\n1️⃣ اضغط على زر "مشاركة" في أسفل المتصفح\n2️⃣ اختر "إضافة إلى الشاشة الرئيسية"\n3️⃣ اضغط "إضافة"';
            } else if (isAndroid) {
                message = '📱 لتثبيت التطبيق على Android:\n\n1️⃣ اضغط على القائمة (⋮) في أعلى المتصفح\n2️⃣ اختر "تثبيت التطبيق"\n3️⃣ اضغط "تثبيت"';
            } else {
                message = '📱 لتثبيت التطبيق على الكمبيوتر:\n\n1️⃣ اضغط على أيقونة التثبيت في شريط العنوان\nأو افتح القائمة واختر "تثبيت التطبيق"';
            }
            alert(message);
        };
    </script>

    <style>

            from { opacity: 0; transform: translate(50%, -20px); }

            from { opacity: 1; transform: translate(50%, 0); }

</head>
<body>

<section id="login-section" class="login-fullscreen">
    <div class="login-header">
        <div style="font-weight: 800; color: var(--primary); font-size: 26px; line-height: 1.3;">الدكتور</div>

        <button onclick="window.handleRegister()" class="btn-key btn-secondary">إرسال طلب تسجيل</button>
    </div>

    <div class="admin-divider"><span>منطقة الإدارة</span></div>

    <div class="admin-access">
        <input type="password" id="adminPass" placeholder="كلمة مرور الإدارة" class="modern-input">
        <button onclick="window.adminAccess()" class="btn-key btn-admin">دخول الإدارة</button>
    </div>

    <button onclick="window.browseAsGuest()" class="btn-key btn-ghost">تصفح كزائر</button>
    
    <button onclick="window.installApp()" class="btn-install">
        <svg width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
            <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>

<script>
    window.switchTab = function(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if (tab === 'login') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }
    };

    window.showNotification = function(message, type = 'info') {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        
        const icons = { success: '✅', error: '❌', info: 'ℹ️' };
        
        notification.innerHTML = `
            <span class="notification-icon">${icons[type]}</span>
            <span>${message}</span>
        `;
        
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.style.animation = 'slideUp 0.3s ease-out';
            setTimeout(() => notification.remove(), 300);
        }, 3000);
    };
</script>
