<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنصة الطبية التخصصية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, updateDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCBbeaPoAYILiVX3yGqhtdvEktZ5DIxlpY",
            authDomain: "clinic-fa8a2.firebaseapp.com",
            projectId: "clinic-fa8a2",
            storageBucket: "clinic-fa8a2.firebasestorage.app",
            messagingSenderId: "316441755643",
            appId: "1:316441755643:web:ba058608b7f7196596155e"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // دوال مساعدة
        window.showAppContent = async () => {
            try {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
                await loadPosts();
            } catch (err) {
                console.error('Error:', err);
            }
        };

        window.showAdminPanel = async () => {
            try {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('app-content').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                
                // تحميل كل شيء
                await loadAppointments();
                await loadPendingUsers();
                await loadApprovedUsers();
                await loadPosts();
            } catch (err) {
                console.error('Error loading admin panel:', err);                alert('خطأ في تحميل البيانات: ' + err.message);
            }
        };

        window.showLogin = async () => {
            try {
                await signOut(auth);
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('app-content').classList.add('hidden');
                document.getElementById('admin-panel').classList.add('hidden');
                document.getElementById('userEmail').value = '';
                document.getElementById('userPass').value = '';
                document.getElementById('adminPass').value = '';
                document.getElementById('user-status').textContent = '';
                document.getElementById('logout-btn').classList.add('hidden');
            } catch (err) {
                console.error('Logout error:', err);
            }
        };

        // التحقق من تسجيل الدخول
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('user-status').textContent = `مرحباً، ${user.email}`;
                document.getElementById('logout-btn').classList.remove('hidden');
                await loadPosts();
            }
        });

        async function checkIfUserApproved(email) {
            try {
                const q = query(collection(db, "users"), where("email", "==", email));
                const querySnapshot = await getDocs(q);
                let isApproved = false;
                querySnapshot.forEach((d) => {
                    if (d.data().isApproved) isApproved = true;
                });
                return isApproved;
            } catch (err) {
                console.error('Check approval error:', err);
                return false;
            }
        }

        window.handleLogin = async () => {
            const email = document.getElementById('userEmail').value;
            const pass = document.getElementById('userPass').value;
            
            if (!email || !pass) {
                alert('يرجى ملء جميع الحقول');                return;
            }
            
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                const isApproved = await checkIfUserApproved(email);

                if (!isApproved) {
                    await signOut(auth);
                    alert('عذراً، حسابك لا يزال قيد مراجعة الإدارة.');
                    return;
                }
                
                await window.showAppContent();
            } catch (error) {
                alert('خطأ في الدخول: ' + error.message);
            }
        };

        window.handleRegister = async () => {
            const email = document.getElementById('newUserEmail').value;
            const pass = document.getElementById('newUserPass').value;
            
            if (!email || !pass) {
                alert('يرجى ملء جميع الحقول');
                return;
            }
            
            if (pass.length < 6) {
                alert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }
            
            try {
                const providers = await fetchSignInMethodsForEmail(auth, email);
                
                if (providers.length > 0) {
                    const isApproved = await checkIfUserApproved(email);
                    if (isApproved) {
                        alert('هذا البريد مسجل مسبقاً. يرجى تسجيل الدخول.');
                    } else {
                        alert('طلبك قيد المراجعة.');
                    }
                    switchTab('login');
                    return;
                }
                
                await createUserWithEmailAndPassword(auth, email, pass);
                await addDoc(collection(db, "users"), {
                    email: email,                    isApproved: false,
                    role: 'patient',
                    createdAt: new Date().toLocaleDateString('ar-SA')
                });
                
                await signOut(auth);
                alert('✅ تم إرسال طلب التسجيل بنجاح!');
                switchTab('login');
                
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        };

        window.handleLogout = async () => {
            await signOut(auth);
            window.showLogin();
        };

        const _adminKey = "c2FsZW0xOTU5"; 
        
        window.adminAccess = async () => {
            const input = document.getElementById('adminPass').value;
            if (input === atob(_adminKey)) {
                await window.showAdminPanel();
            } else { 
                alert('كلمة مرور الإدارة غير صحيحة'); 
            }
        };

        window.browseAsGuest = async () => {
            await window.showAppContent();
        };

        // ========== المواعيد ==========
        window.bookAppointment = async () => {
            const name = document.getElementById('appointmentName').value.trim();
            const phone = document.getElementById('appointmentPhone').value.trim();
            const date = document.getElementById('appointmentDate').value;
            const notes = document.getElementById('appointmentNotes').value.trim();
            
            if (!name || !phone || !date) {
                alert('يرجى ملء الحقول المطلوبة');
                return;
            }
            
            try {
                await addDoc(collection(db, "appointments"), {
                    name: name,
                    phone: phone,                    date: date,
                    notes: notes || 'لا يوجد',
                    status: 'pending',
                    createdAt: new Date().toISOString()
                });
                
                document.getElementById('appointmentName').value = '';
                document.getElementById('appointmentPhone').value = '';
                document.getElementById('appointmentDate').value = '';
                document.getElementById('appointmentNotes').value = '';
                
                alert('✅ تم إرسال طلب الحجز بنجاح!');
            } catch (error) {
                alert('خطأ: ' + error.message);
            }
        };

        window.loadAppointments = async () => {
            try {
                const wrapper = document.getElementById('appointments-wrapper');
                wrapper.innerHTML = "<p>جاري التحميل...</p>";
                
                const q = query(collection(db, "appointments"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                console.log('عدد المواعيد:', querySnapshot.size);
                wrapper.innerHTML = "";
                
                let pendingCount = 0;
                let totalCount = 0;
                
                if (querySnapshot.empty) {
                    wrapper.innerHTML = "<p style='text-align:center; color:#666; padding:20px;'>لا توجد مواعيد</p>";
                    document.getElementById('appointments-count').textContent = '(0)';
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    totalCount++;
                    if (data.status === 'pending') pendingCount++;
                    
                    const statusColors = {
                        'pending': 'background:#fef3c7; color:#92400e;',
                        'confirmed': 'background:#d1fae5; color:#065f46;',
                        'completed': 'background:#dbeafe; color:#1e40af;',
                        'cancelled': 'background:#fee2e2; color:#991b1b;'
                    };
                    
                    const statusText = {                        'pending': '⏳ انتظار',
                        'confirmed': '✅ مؤكد',
                        'completed': '✔️ مكتمل',
                        'cancelled': '❌ ملغي'
                    };
                    
                    wrapper.innerHTML += `
                        <div class="appointment-card">
                            <div class="appointment-header">
                                <div>
                                    <strong>${data.name}</strong>
                                    <span style="background:${statusColors[data.status]}; padding:3px 10px; border-radius:12px; font-size:11px; margin-right:8px;">${statusText[data.status]}</span>
                                </div>
                                <span class="post-date">${data.date}</span>
                            </div>
                            <div style="font-size:14px; margin-bottom:10px;">📱 ${data.phone}</div>
                            <div class="user-actions">
                                <button onclick="updateStatus('${docSnap.id}', 'confirmed')" class="btn-action btn-share">تأكيد</button>
                                <button onclick="updateStatus('${docSnap.id}', 'completed')" class="btn-action" style="background:#dbeafe; color:#2563eb;">مكتمل</button>
                                <button onclick="updateStatus('${docSnap.id}', 'cancelled')" class="btn-action" style="background:#fef3c7; color:#92400e;">إلغاء</button>
                                <button onclick="deleteDoc(doc(db, 'appointments', '${docSnap.id}')).then(loadAppointments)" class="btn-action btn-delete">حذف</button>
                            </div>
                        </div>`;
                });
                
                document.getElementById('appointments-count').textContent = `(${totalCount})`;
                document.getElementById('pending-count').textContent = pendingCount > 0 ? `(${pendingCount} جديد)` : '';
            } catch (err) {
                console.error('Load appointments error:', err);
                document.getElementById('appointments-wrapper').innerHTML = 
                    `<p style='color:red'>خطأ: ${err.message}</p>`;
            }
        };

        window.updateStatus = async (docId, status) => {
            try {
                await updateDoc(doc(db, "appointments", docId), { status });
                await loadAppointments();
                alert('تم التحديث');
            } catch (err) {
                alert('خطأ: ' + err.message);
            }
        };

        // ========== المستخدمين ==========
        window.loadPendingUsers = async () => {
            try {
                const q = query(collection(db, "users"), where("isApproved", "==", false));
                const querySnapshot = await getDocs(q);
                const wrapper = document.getElementById('pending-users-wrapper');                wrapper.innerHTML = "";
                
                console.log('الطلبات المعلقة:', querySnapshot.size);
                
                if (querySnapshot.empty) {
                    wrapper.innerHTML = "<p style='text-align:center; color:#666; padding:20px;'>لا توجد طلبات معلقة</p>";
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    wrapper.innerHTML += `
                        <div class="user-card">
                            <div class="user-info"><strong>${data.email}</strong></div>
                            <div class="user-actions">
                                <button onclick="approveUser('${docSnap.id}')" class="btn-action btn-share">قبول</button>
                                <button onclick="deleteDoc(doc(db, 'users', '${docSnap.id}')).then(loadPendingUsers)" class="btn-action btn-delete">حذف</button>
                            </div>
                        </div>`;
                });
            } catch (err) {
                console.error('Load pending users error:', err);
            }
        };

        window.loadApprovedUsers = async () => {
            try {
                const q = query(collection(db, "users"), where("isApproved", "==", true));
                const querySnapshot = await getDocs(q);
                const wrapper = document.getElementById('approved-users-wrapper');
                wrapper.innerHTML = "";
                
                console.log('المستخدمون المقبولون:', querySnapshot.size);
                
                if (querySnapshot.empty) {
                    wrapper.innerHTML = "<p style='text-align:center; color:#666; padding:20px;'>لا يوجد مشتركين</p>";
                    document.getElementById('users-count').textContent = '(0)';
                    return;
                }

                let count = 0;
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    count++;
                    wrapper.innerHTML += `
                        <div class="user-card">
                            <div class="user-info"><strong>${data.email}</strong></div>
                            <div class="user-actions">
                                <button onclick="deleteDoc(doc(db, 'users', '${docSnap.id}')).then(loadApprovedUsers)" class="btn-action btn-delete">حذف</button>
                            </div>                        </div>`;
                });
                
                document.getElementById('users-count').textContent = `(${count})`;
            } catch (err) {
                console.error('Load approved users error:', err);
            }
        };

        window.approveUser = async (docId) => {
            try {
                await updateDoc(doc(db, "users", docId), { isApproved: true });
                await loadPendingUsers();
                await loadApprovedUsers();
                alert('✅ تم القبول');
            } catch (err) {
                alert('خطأ: ' + err.message);
            }
        };

        // ========== التدوينات ==========
        window.addPost = async () => {
            const title = document.getElementById('postTitle').value;
            const text = document.getElementById('postText').value;
            const file = document.getElementById('imageInput').files[0];
            
            if (!file || !title) {
                alert('يرجى اختيار صورة وعنوان');
                return;
            }

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    await addDoc(collection(db, "posts"), { 
                        title, 
                        text, 
                        img: e.target.result,
                        date: new Date().toLocaleDateString('ar-SA')
                    });
                    document.getElementById('postTitle').value = '';
                    document.getElementById('postText').value = '';
                    document.getElementById('imageInput').value = '';
                    alert('✅ تم النشر');
                    await loadPosts();
                } catch (err) {
                    alert('خطأ: ' + err.message);
                }
            };
            reader.readAsDataURL(file);        };

        window.loadPosts = async () => {
            try {
                const querySnapshot = await getDocs(collection(db, "posts"));
                const wrapper = document.getElementById('posts-wrapper');
                wrapper.innerHTML = "";
                
                console.log('عدد التدوينات:', querySnapshot.size);
                
                if (querySnapshot.empty) {
                    wrapper.innerHTML = "<p style='text-align:center; color:#666; padding:40px;'>لا توجد تدوينات</p>";
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    wrapper.innerHTML += `
                        <div class="post-card">
                            <div class="post-header">
                                <h3>${data.title}</h3>
                                <span class="post-date">${data.date}</span>
                            </div>
                            <img src="${data.img}" style="width:100%; border-radius:8px; margin-bottom:12px;">
                            <p>${data.text}</p>
                            <div class="post-actions">
                                <button onclick="deleteDoc(doc(db, 'posts', '${docSnap.id}')).then(loadPosts)" class="btn-action btn-delete">حذف</button>
                            </div>
                        </div>`;
                });
            } catch (err) {
                console.error('Load posts error:', err);
                document.getElementById('posts-wrapper').innerHTML = 
                    `<p style='color:red'>خطأ: ${err.message}</p>`;
            }
        };

        window.updateWhatsApp = () => {
            const num = document.getElementById('whatsappNumber').value;
            if (!num) {
                alert('يرجى إدخال الرقم');
                return;
            }
            document.getElementById('whatsappLink').href = "https://wa.me/" + num;
            alert("✅ تم الحفظ");
        };
    </script>
    <style>
        :root {
            --primary: #0077b6;            --secondary: #2a9d8f;
            --dark: #264653;
            --white: #ffffff;
            --radius: 16px;
        }

        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #e0f7fa 0%, #f0f4f8 100%); 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            color: var(--dark);
        }

        .hidden { display: none !important; }

        .login-fullscreen { 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin: 0 auto;
            max-width: 450px; 
            width: 90%;
            background: var(--white); 
            padding: 40px 30px; 
            border-radius: var(--radius); 
            box-shadow: 0 8px 32px rgba(0, 119, 182, 0.1);
        }

        .admin-fullscreen {
            min-height: 100vh;
            margin: 0 auto;
            max-width: 800px;
            width: 90%;
            padding: 30px 0;
        }

        .section { 
            background: var(--white); 
            padding: 30px; 
            margin: 20px auto; 
            max-width: 800px; 
            width: 90%; 
            border-radius: var(--radius); 
            box-shadow: 0 8px 32px rgba(0, 119, 182, 0.1);        }

        .login-header { text-align: center; margin-bottom: 25px; }
        .login-header h2 { color: var(--primary); margin: 0 0 8px 0; }

        .auth-tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #f8f9fa; padding: 5px; border-radius: 12px; }
        .tab-btn { 
            flex: 1; padding: 10px; border: none; background: transparent; 
            font-family: 'Cairo', sans-serif; font-weight: 700; color: #666; 
            border-radius: 8px; cursor: pointer;
        }
        .tab-btn.active { background: var(--white); color: var(--primary); }

        .modern-input { 
            width: 100%; padding: 14px; margin: 8px 0; 
            border: 2px solid #e9ecef; border-radius: 12px; 
            font-family: 'Cairo', sans-serif;
        }

        .btn-key { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            font-family: 'Cairo', sans-serif; font-weight: 700; 
            cursor: pointer; margin-top: 10px;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-admin { background: #f8f9fa; color: var(--dark); border: 2px solid #e9ecef; }
        .btn-ghost { background: transparent; color: #666; border: 1px dashed #ccc; }

        .admin-divider { text-align: center; margin: 25px 0 15px; position: relative; }
        .admin-divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e9ecef; }
        .admin-divider span { background: var(--white); padding: 0 15px; position: relative; color: #999; }

        .admin-panel-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; padding: 20px; background: var(--white); 
            border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0, 119, 182, 0.1);
        }
        .btn-logout { background: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }

        .admin-section {
            background: var(--white); padding: 25px; margin-bottom: 20px;
            border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0, 119, 182, 0.1);
        }

        .user-card, .post-card, .appointment-card { 
            background: #fafafa; border-radius: 12px; padding: 20px; 
            margin-bottom: 15px; border: 1px solid #eee;
        }        
        .user-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-action { 
            flex: 1; padding: 10px; border: none; border-radius: 8px; 
            font-family: 'Cairo'; cursor: pointer;
        }
        .btn-delete { background: #fee2e2; color: #dc2626; }
        .btn-share { background: #d1fae5; color: #059669; }

        .appointment-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .post-header h3 { margin: 0; color: var(--primary); }
        .post-date { font-size: 12px; color: #999; }

        footer { 
            background: var(--dark); color: white; padding: 40px 20px; 
            text-align: center; margin-top: auto; 
        }
        .footer-content { max-width: 600px; margin: 0 auto; }
        .btn-footer { 
            display: inline-block; background: #25D366; color: white; 
            padding: 12px 24px; border-radius: 50px; text-decoration: none; 
            margin-top: 15px;
        }
        
        .appointment-form { display: grid; gap: 10px; margin-bottom: 20px; }
        .appointment-form input, .appointment-form textarea {
            width: 100%; padding: 14px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1); color: white; font-family: 'Cairo';
        }
        .appointment-form input::placeholder, .appointment-form textarea::placeholder {
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>

<section id="login-section" class="login-fullscreen">
    <div class="login-header">
        <h2>المنصة الطبية التخصصية</h2>
        <p>مرحباً بك</p>
    </div>
    
    <div class="auth-tabs">
        <button class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
        <button class="tab-btn" onclick="switchTab('register')">حساب جديد</button>
    </div>

    <div id="login-form">
        <input type="email" id="userEmail" placeholder="البريد الإلكتروني" class="modern-input">        <input type="password" id="userPass" placeholder="كلمة المرور" class="modern-input">
        <button onclick="handleLogin()" class="btn-key btn-primary">دخول المريض</button>
        <p id="user-status" style="text-align:center; margin-top:10px; color:var(--secondary);"></p>
    </div>

    <div id="register-form" class="hidden">
        <input type="email" id="newUserEmail" placeholder="البريد الإلكتروني" class="modern-input">
        <input type="password" id="newUserPass" placeholder="كلمة المرور (6 أحرف)" class="modern-input">
        <button onclick="handleRegister()" class="btn-key btn-secondary">إرسال طلب تسجيل</button>
    </div>

    <div class="admin-divider"><span>منطقة الإدارة</span></div>

    <div class="admin-access">
        <input type="password" id="adminPass" placeholder="كلمة مرور الإدارة" class="modern-input">
        <button onclick="adminAccess()" class="btn-key btn-admin">دخول الإدارة</button>
    </div>

    <button onclick="browseAsGuest()" class="btn-key btn-ghost">تصفح كزائر</button>
</section>

<div id="admin-panel" class="admin-fullscreen hidden">
    <div class="admin-panel-header">
        <h3>⚙️ لوحة تحكم الإدارة</h3>
        <button onclick="showLogin()" class="btn-logout">خروج</button>
    </div>
    
    <div class="admin-section">
        <h4>📅 المواعيد <span id="appointments-count"></span> <span id="pending-count"></span></h4>
        <div id="appointments-wrapper"></div>
    </div>

    <div class="admin-section">
        <label>📱 رقم الواتساب</label>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <input type="text" id="whatsappNumber" placeholder="966500000000" class="modern-input" style="margin:0;">
            <button onclick="updateWhatsApp()" class="btn-key btn-secondary" style="width:auto; margin:0; padding:0 20px;">حفظ</button>
        </div>
    </div>

    <div class="admin-section">
        <h4>⏳ الطلبات المعلقة</h4>
        <div id="pending-users-wrapper"></div>
    </div>

    <div class="admin-section">
        <h4>👥 المشتركين <span id="users-count"></span></h4>
        <div id="approved-users-wrapper"></div>
    </div>
    <div class="admin-section">
        <h4>📝 نشر تدوينة</h4>
        <input type="text" id="postTitle" placeholder="العنوان" class="modern-input">
        <textarea id="postText" placeholder="المحتوى" class="modern-input" rows="3"></textarea>
        <input type="file" id="imageInput" accept="image/*" class="modern-input">
        <button onclick="addPost()" class="btn-key btn-primary">نشر</button>
    </div>
</div>

<div id="app-content" class="hidden">
    <section class="section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--primary); margin:0;">📰 المدونة الطبية</h2>
            <button id="logout-btn" onclick="handleLogout()" class="btn-logout hidden">تسجيل الخروج</button>
        </div>
        <div id="posts-wrapper"></div>
    </section>

    <footer>
        <div class="footer-content">
            <h2>📅 حجز موعد</h2>
            <div class="appointment-form">
                <input type="text" id="appointmentName" placeholder="الاسم الكامل *">
                <input type="tel" id="appointmentPhone" placeholder="رقم الجوال *">
                <input type="date" id="appointmentDate">
                <textarea id="appointmentNotes" placeholder="ملاحظات (اختياري)" rows="2"></textarea>
                <button onclick="bookAppointment()" class="btn-key btn-secondary">إرسال طلب الحجز</button>
            </div>
            
            <a id="whatsappLink" href="https://wa.me/" target="_blank" class="btn-footer"> واتساب</a>
            <p style="margin-top:30px; font-size:13px; opacity:0.7;">© 2026</p>
        </div>
    </footer>
</div>

<script>
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if (tab === 'login') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }
    }
</script>
</body>
</html>
